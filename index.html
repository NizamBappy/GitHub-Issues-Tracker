<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind & daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="bg-gray-100 h-dvh w-4/12 mx-auto pt-8 mt-10 space-y-8 ">
            <div class="text-center">
                    <img src="./assets/github-logo.png" alt="GitHub Logo" class="mx-auto">
                <h2 class="text-2xl text-[#1F2937] font-semibold">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <div class="mx-auto">
                 <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto">
                    <div class="card-body rounded-2xl space-y-2.5">
                        <fieldset class="fieldset">
                        <label class="label  text-[#1F2937] font-bold outline-none">Username</label>
                        <input type="text" class="input" placeholder="Enter Username" />
                        <label class="label  text-[#1F2937] font-bold outline-none">Password</label>
                        <input type="password" class="input" placeholder="Password" />
                        
                        <button id="login-btn" class="btn btn-primary mt-4">Login</button>
                        </fieldset>
                    </div>
                </div>    
            </div>
        </section>
    </main>
</body>
</html>
