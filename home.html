<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind & daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm w-11/12 mx-auto">
            <div class="navbar-start flex items-center gap-2">
                <div class="w-10">
                    <img src="./assets/github-logo.png" alt="" class="w-[100px]">
                </div>
                <a class="text-2xl font-bold">GitHub Issues Tracker</a>
            </div>
            
            <div class="navbar-end space-x-5">
                <label class="input outline-none">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g
                        stroke-linejoin="round"
                        stroke-linecap="round"
                        stroke-width="2.5"
                        fill="none"
                        stroke="currentColor"
                        >
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input  type="search" required placeholder="Search issues..." />
                </label>
                <button class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <main class="w-11/12 mx-auto bg-gray-100 mt-10 p-5">
        <section id="btn-container" class="bg-white p-5">
            <div>
                <button id="all-btn" class="btn btn-primary">All</button>
                <button id="open-btn" class="btn">Open</button>
                <button id="close-btn" class="btn">Close</button>
            </div>
        </section>

        <section class="bg-white p-5 mt-5">
            <div id="total-issues">
                <!-- <div class="flex items-center gap-5">
                <div class="bg-[#ECE4FF] rounded-full p-3 flex items-center justify-center">
                    <img src="./assets/Aperture.png">
                </div>
                <div>
                    <h3 class="font-bold text-2xl">10 Issues</h3>
                    <p class="text-gray-400">Track and manage your project issues</p>
                </div>
            </div> -->
            </div>

            <div id="loading-spinner" class="h-[60vh] flex hidden justify-center    items-center " >
                     <span class="loading loading-dots loading-xl"></span>

            </div>
        </section>

        <section class="mt-5">
            <div id="card-container" class="grid grid-cols-4 gap-5">
                
                 

            </div>
            <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <div id="details-container" class="space-y-5">
                        
                    </div>
                    <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                    </div>
                </div>
            </dialog>
        </section>
    </main>
    <!-- <script src="./script/login.js"></script> -->
    <script src="./script/script.js"></script>
    
</body>
</html>
